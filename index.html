<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التحاليل الطبية - إدخال النتائج</title>
    <style>
        :root {
            --primary-color: #0284c7;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            background: var(--card-bg);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header h1 {
            color: var(--primary-color);
            font-size: 28px;
            margin: 0 0 10px 0;
        }
        .header p {
            color: #64748b;
            margin: 0;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 15px;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #f1f5f9;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #0369a1;
        }
        .nav-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
        }
        .alert {
            display: none;
            background-color: #d1fae5;
            color: #065f46;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="header">
            <h1>إدخال نتائج التحاليل 🧪</h1>
            <p>قم بملء البيانات الطبية للمريض بدقة</p>
        </div>

        <div id="successAlert" class="alert">تم حفظ النتيجة بنجاح! يمكنك استعراضها الآن.</div>

        <form id="analysisForm">
            <div class="form-group">
                <label>اسم المريض الكامل</label>
                <input type="text" id="patientName" placeholder="مثال: محمد علي حسن" required>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>رقم الهوية / الملف</label>
                    <input type="text" id="patientId" placeholder="ID-1029" required>
                </div>
                <div class="form-group">
                    <label>عمر المريض</label>
                    <input type="number" id="patientAge" placeholder="25" required>
                </div>
            </div>

            <div class="form-group">
                <label>نوع التحليل الطبي</label>
                <select id="testType" required>
                    <option value="">اختر التحليل...</option>
                    <option value="تعداد الدم الكامل (CBC)">تعداد الدم الكامل (CBC)</option>
                    <option value="فحص السكر (Glucose)">فحص السكر (Glucose)</option>
                    <option value="وظائف الكلى (Kidney Function)">وظائف الكلى (Kidney Function)</option>
                    <option value="ملف الدهون (Lipid Profile)">ملف الدهون (Lipid Profile)</option>
                </select>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>النتيجة الحالية</label>
                    <input type="text" id="testResult" placeholder="مثال: 95 mg/dL" required>
                </div>
                <div class="form-group">
                    <label>المعدل الطبيعي (Reference)</label>
                    <input type="text" id="testRef" placeholder="مثال: 70 - 100" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">حفظ وإرسال النتيجة</button>
        </form>

        <a href="results.html" class="nav-link">الانتقال إلى صفحة عرض النتائج ←</a>
    </div>

    <script>
        document.getElementById('analysisForm').addEventListener('submit', function(e) {
            e.preventDefault(); // منع الصفحة من إعادة التحميل الافتراضية
            
            // تجميع البيانات المدخلة
            const patientData = {
                name: document.getElementById('patientName').value,
                id: document.getElementById('patientId').value,
                age: document.getElementById('patientAge').value,
                testName: document.getElementById('testType').value,
                result: document.getElementById('testResult').value,
                reference: document.getElementById('testRef').value,
                date: new Date().toLocaleDateString('ar-EG')
            };

            // حفظها في متصفح المستخدم
            localStorage.setItem('latestPatientReport', JSON.stringify(patientData));

            // إظهار رسالة النجاح وتصفير الاستمارة
            document.getElementById('successAlert').style.display = 'block';
            document.getElementById('analysisForm').reset();
            
            // إخفاء التنبيه تلقائياً بعد 3 ثواني
            setTimeout(() => {
                document.getElementById('successAlert').style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
