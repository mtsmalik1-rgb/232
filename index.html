<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي الشخصي الأول</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 500px;
            width: 100%;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            color: #007bff;
            margin-bottom: 10px;
        }
        p {
            font-size: 17px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            background-color: #218838;
        }
        /* الأقسام الجديدة التي تم إضافتها كتكملة للكود */
        .section-title {
            font-size: 20px;
            color: #333;
            margin-top: 25px;
            border-bottom: 2px solid #007bff;
            padding-bottom: 5px;
            display: inline-block;
        }
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }
        .social-btn {
            padding: 8px 15px;
            background-color: #e9ecef;
            color: #495057;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
            transition: 0.3s;
        }
        .social-btn:hover {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>أهلاً بك في موقعي الأول! 🎉</h1>
            <p>هذا الموقع تم إنشاؤه للتجربة واستضافته مجاناً على جيتهاب بايجز (GitHub Pages).</p>
            <a href="#about" class="btn">اكتشف المزيد عني 👇</a>
            
            <div id="about">
                <h2 class="section-title">من أنا؟</h2>
                <p>أنا مطور مواقع مبتدئ، أتعلم حالياً كيفية بناء المواقع باستخدام HTML و CSS، وهذا هو مشروعي الأول على منصة GitHub!</p>
            </div>

            <div>
                <h2 class="section-title">تواصل معي</h2>
                <div class="social-links">
                    <a href="#" class="social-btn">حسابي في X</a>
                    <a href="#" class="social-btn">لينكد إن</a>
                    <a href="https://github.com/mtsmalik1-rgb" class="social-btn" target="_blank">جيتهاب</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
